    <script>
        Let currentLang = ‘bg’;
        
        // Функция за превключване на езика
        Function toggleLanguage() {
            Const allTitles = document.querySelectorAll(‘.section-title’);
            Const langBtn = document.getElementById(‘langBtn’);
            Const subtitle = document.getElementById(‘subtitle’);
            Const fullCollectionTitle = document.getElementById(‘fullCollectionTitle’);
            Const menuTitle = document.getElementById(‘menuTitle’);
            Const menuDesc = document.getElementById(‘menuDesc’);
            Const reserveBtn = document.getElementById(‘reserveBtn’);
            Const footerAddress = document.getElementById(‘footerAddress’);
            Const footerResLabel = document.getElementById(‘footerResLabel’);
            Const footerCopyright = document.getElementById(‘footerCopyright’);
            Const footerRights = document.getElementById(‘footerRights’);
            
            If (currentLang === ‘bg’) {
                // Преминаваме на английски
                currentLang = ‘en’;
                langBtn.textContent = ‘BG’;
                subtitle.textContent = ‘Plovdiv · Since 2012’;
                fullCollectionTitle.textContent = ‘THE FULL COLLECTION’;
                menuTitle.innerHTML = ‘Our <br class=”block md:hidden”> Menu’;
                menuDesc.textContent = ‘Explore our selection of signature cocktails, premium spirits and culinary delights.’;
                reserveBtn.textContent = ‘Reservation’;
                footerAddress.textContent = ’21 Yoakim Gruev St, Plovdiv’;
                footerResLabel.textContent = ‘Reservations’;
                footerCopyright.textContent = ‘© 2026 Tomato Restaurant’;
                footerRights.textContent = ‘All Rights Reserved’;
                
                // Смяна на заглавията на секциите
                allTitles.forEach(title => {
                    const enText = title.getAttribute(‘data-en’);
                    if (enText) title.textContent = enText;
                });
            } else {
                // Преминаваме на български
                currentLang = ‘bg’;
                langBtn.textContent = ‘EN’;
                subtitle.textContent = ‘Plovdiv · От 2012’;
                fullCollectionTitle.textContent = ‘THE FULL COLLECTION’;
                menuTitle.innerHTML = ‘Нашето <br class=”block md:hidden”> Меню’;
                menuDesc.textContent = ‘Разгледайте нашата селекция от авторски коктейли, премиум напитки и кулинарни изкушения.’;
                reserveBtn.textContent = ‘Резервация’;
                footerAddress.textContent = ‘ул. “Йоаким Груев” 21, Пловдив’;
                footerResLabel.textContent = ‘Резервации’;
                footerCopyright.textContent = ‘© 2026 Tomato Restaurant’;
                footerRights.textContent = ‘Всички права запазени’;
                
                // Смяна на заглавията на секциите
                allTitles.forEach(title => {
                    const bgText = title.getAttribute(‘data-bg’);
                    if (bgText) title.textContent = bgText;
                });
            }
        }
        
        // Функция за показване на секции
        Function showSection(section) {
            Const drinksDiv = document.getElementById(‘drinksSection’);
            Const foodDiv = document.getElementById(‘foodSection’);
            Const btnDrinks = document.getElementById(‘btnDrinks’);
            Const btnFood = document.getElementById(‘btnFood’);
            
            If (section === ‘drinks’) {
                drinksDiv.classList.remove(‘hidden’);
                foodDiv.classList.add(‘hidden’);
                btnDrinks.className = ‘px-8 md:px-12 py-4 border text-[10px] uppercase tracking-[0.4em] font-black transition-all duration-500 bg-jazz-gold text-black border-jazz-gold shadow-2xl scale-[1.05]’;
                btnFood.className = ‘px-8 md:px-12 py-4 border text-[10px] uppercase tracking-[0.4em] font-black transition-all duration-500 bg-transparent text-white border-white/20 hover:border-jazz-gold/50’;
            } else {
                drinksDiv.classList.add(‘hidden’);
                foodDiv.classList.remove(‘hidden’);
                btnFood.className = ‘px-8 md:px-12 py-4 border text-[10px] uppercase tracking-[0.4em] font-black transition-all duration-500 bg-jazz-gold text-black border-jazz-gold shadow-2xl scale-[1.05]’;
                btnDrinks.className = ‘px-8 md:px-12 py-4 border text-[10px] uppercase tracking-[0.4em] font-black transition-all duration-500 bg-transparent text-white border-white/20 hover:border-jazz-gold/50’;
            }
        }
    </script>
