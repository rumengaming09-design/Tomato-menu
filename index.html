                <div className="fixed top-0 left-0 w-full z-50 backdrop-blur-md bg-jazz-black/70 border-b border-white/5 py-5 px-6 md:px-16 flex justify-between items-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>

                            <span className="text-jazz-gold text-xs font-bold">T</span>
                        </div>
                        <span className="text-xl font-serif font-bold text-jazz-gold tracking-tighter">TOMATO</span>
                    </div>
                    <div className="flex items-center gap-4">
                        <div className="flex items-center gap-3 bg-white/[0.03] border border-white/10 rounded-full px-4 py-2">
                            <button onClick={() => setLang('BG')} className={`text-[10px] font-black tracking-widest transition-colors ${lang === 'BG' ? 'text-jazz-gold' : 'text-white/40 hover:text-white'}`}>BG</button>
                            <div className="w-[1px] h-3 bg-white/10"></div>
                            <button onClick={() => setLang('EN')} className={`text-[10px] font-black tracking-widest transition-colors ${lang === 'EN' ? 'text-jazz-gold' : 'text-white/40 hover:text-white'}`}>EN</button>
                        </div>
                    </div>
                </div>

                {/* Main content: full menu with tabs & categories */}
                <div className="pt-32 pb-24 px-6 md:px-16 max-w-7xl mx-auto">
                    <div className="text-center mb-12 md:mb-20">
                        <span className="text-[10px] uppercase tracking-[0.6em] text-jazz-gold mb-6 block font-bold opacity-60">{t.fullMenuTitle}</span>
                        <h2 className="text-5xl md:text-9xl font-serif text-white italic tracking-tighter leading-none">
                            {t.menuHeader.split(' ')[0]} <br /> {t.menuHeader.split(' ').slice(1).join(' ')}
                        </h2>
                        
                        <div className="mt-16 flex flex-col items-center">
                            <div className="w-full max-w-2xl bg-gradient-to-r from-jazz-gold/5 via-jazz-gold/10 to-jazz-gold/5 border-2 border-jazz-gold/40 rounded-lg p-8 md:p-12 backdrop-blur-sm">
                                <span className="text-[10px] uppercase tracking-[0.5em] text-jazz-gold mb-6 font-bold opacity-80 block text-center">{t.workingHoursTitle}</span>
                                <div className="flex flex-col gap-3">
                                    {t.workingHours.map((line, i) => (
                                        <p key={i} className="text-jazz-gold text-sm md:text-lg font-serif italic tracking-wide text-center font-bold">{line}</p>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Toggle Buttons (Drinks / Food) */}
                    <div className="flex flex-wrap justify-center gap-4 mb-20">
                        <button
                            onClick={() => setMenuSection('drinks')}
                            className={`px-8 md:px-16 py-4 md:py-5 border text-[10px] uppercase tracking-[0.4em] font-black transition-all duration-500 flex items-center gap-3 ${menuSection === 'drinks' ? 'bg-jazz-gold text-jazz-black border-jazz-gold shadow-2xl scale-[1.05]' : 'bg-transparent text-white border-white/20 hover:border-jazz-gold/50'}`}
                        >
                            <Wine size={16} /> {t.drinksTab}
                        </button>
                        <button
                            onClick={() => setMenuSection('food')}
                            className={`px-8 md:px-16 py-4 md:py-5 border text-[10px] uppercase tracking-[0.4em] font-black transition-all duration-500 flex items-center gap-3 ${menuSection === 'food' ? 'bg-jazz-gold text-jazz-black border-jazz-gold shadow-2xl scale-[1.05]' : 'bg-transparent text-white border-white/20 hover:border-jazz-gold/50'}`}
                        >
                            <UtensilsCrossed size={16} /> {t.foodTab}
                        </button>
                    </div>

                    {/* Dynamic Menu Content */}
                    <AnimatePresence mode="wait">
                        <motion.div
                            key={menuSection}
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            exit={{ opacity: 0, y: -10 }}
                            transition={{ duration: 0.4 }}
                            className="space-y-32"
                        >
                            {menuSection === 'drinks' && drinksGroup && (
                                <div>
                                    <div className="flex flex-col items-center mb-16 px-4">
                                        <div className="w-12 h-[1px] bg-jazz-gold/30 mb-6"></div>
                                        <h3 className="text-3xl md:text-6xl font-serif text-white italic tracking-tighter text-center">{drinksGroup.title}</h3>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-16 md:gap-24">
                                        {drinksGroup.categories.map((cat, idx) => (
                                            <motion.div key={cat.name} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: idx * 0.1 }} className="space-y-12">
                                                <h4 className="text-jazz-gold text-xs uppercase tracking-[0.5em] font-bold pb-6 border-b border-jazz-gold/20 italic">{cat.name}</h4>
                                                <div className="space-y-12">
                                                    {cat.items.map((item) => (
                                                        <div key={item.name} className="group cursor-pointer">
                                                            <div className="flex justify-between items-start mb-3 gap-4">
                                                                <h5 className="text-xl md:text-2xl font-serif italic text-jazz-cream group-hover:text-jazz-gold transition-colors leading-tight">{item.name}</h5>
                                                                <span className="text-[11px] text-jazz-gold/40 italic whitespace-nowrap pt-2 font-bold">{item.price}</span>
                                                            </div>
                                                            <p className="text-[10px] text-white/30 uppercase tracking-[0.2em] leading-relaxed max-w-[80%]">{item.info}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </motion.div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {menuSection === 'food' && foodGroup && (
                                <div>
                                    <div className="flex flex-col items-center mb-16 px-4">
                                        <div className="w-12 h-[1px] bg-jazz-gold/30 mb-6"></div>
                                        <h3 className="text-3xl md:text-6xl font-serif text-white italic tracking-tighter text-center">{foodGroup.title}</h3>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-16 md:gap-24">
                                        {foodGroup.categories.map((cat, idx) => (
                                            <motion.div key={cat.name} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: idx * 0.1 }} className="space-y-12">
                                                <h4 className="text-jazz-gold text-xs uppercase tracking-[0.5em] font-bold pb-6 border-b border-jazz-gold/20 italic">{cat.name}</h4>
                                                <div className="space-y-12">
                                                    {cat.items.map((item) => (
                                                        <div key={item.name} className="group cursor-pointer">
                                                            <div className="flex justify-between items-start mb-3 gap-4">
                                                                <h5 className="text-xl md:text-2xl font-serif italic text-jazz-cream group-hover:text-jazz-gold transition-colors leading-tight">{item.name}</h5>
                                                                <span className="text-[11px] text-jazz-gold/40 italic whitespace-nowrap pt-2 font-bold">{item.price}</span>
                                                            </div>
                                                            <p className="text-[10px] text-white/30 uppercase tracking-[0.2em] leading-relaxed max-w-[80%]">{item.info}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </motion.div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </motion.div>
                    </AnimatePresence>

                    {/* Simple Footer */}
                    <div className="mt-40 pt-12 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="text-center md:text-left">
                            <p className="text-[10px] uppercase tracking-widest text-white/20">© 2026 Tomato · Plovdiv</p>
                        </div>
                        <div className="flex gap-8">
                            <a href="#" className="text-[10px] uppercase tracking-widest text-white/40 hover:text-jazz-gold transition-colors">Instagram</a>
                            <a href="#" className="text-[10px] uppercase tracking-widest text-white/40 hover:text-jazz-gold transition-colors">Facebook</a>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
