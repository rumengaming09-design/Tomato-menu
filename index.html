    <style>
•	{
            Margin: 0;
            Padding: 0;
            Box-sizing: border-box;
        }

        Body {
            Background-color: #0a0a0a;
            Font-family: ‚Segoe UI‘, ‚Poppins‘, system-ui, -apple-system, sans-serif;
            Color: #e8ddd0;
        }

        /* Основен контейнер */
        .site-container {
            Max-width: 1300px;
            Margin: 0 auto;
            Background: #0f0e0c;
            Min-height: 100vh;
        }

        /* Хедър секция – като оригиналния сайт */
        .hero-section {
            Background: linear-gradient(135deg, #1a1612 0%, #0c0a08 100%);
            Padding: 1.8rem 2rem 1.2rem;
            Text-align: center;
            Border-bottom: 1px solid #2a241e;
        }

        .logo-text {
            Font-size: 2.8rem;
            Font-weight: 800;
            Letter-spacing: -1px;
            Background: linear-gradient(135deg, #f5a65b, #e07c2c);
            -webkit-background-clip: text;
            Background-clip: text;
            Color: transparent;
            Margin-bottom: 0.3rem;
        }

        .subhead {
            Color: #b68b54;
            Font-size: 0.85rem;
            Letter-spacing: 2px;
            Margin-bottom: 1rem;
        }

        /* Температурен индикатор – като на сайта */
        .temp-bar {
            Display: flex;
            Justify-content: flex-end;
            Align-items: center;
            Gap: 0.5rem;
            Font-size: 0.8rem;
            Color: #d4a373;
            Margin-top: 0.5rem;
            Border-top: 1px solid #2a241e;
            Padding-top: 0.8rem;
        }

        .temp-value {
            Background: #1e1a16;
            Padding: 0.2rem 0.8rem;
            Border-radius: 20px;
            Font-weight: 600;
        }

        /* Горна лента с език */
        .top-bar-flex {
            Display: flex;
            Justify-content: flex-end;
            Margin-bottom: 0.8rem;
        }

        .lang-buttons {
            Display: flex;
            Gap: 0.6rem;
            Background: #1c1814;
            Padding: 0.3rem 0.8rem;
            Border-radius: 50px;
        }

        .lang-btn {
            Background: none;
            Border: none;
            Color: #c9b28b;
            Font-weight: 600;
            Font-size: 0.8rem;
            Padding: 0.3rem 1rem;
            Border-radius: 30px;
            Cursor: pointer;
            Transition: 0.2s;
            Font-family: inherit;
        }

        .lang-btn.active {
            Background: #e07c2c;
            Color: white;
        }

        /* Таб навигация (Кухня / Напитки) */
        .tab-nav {
            Display: flex;
            Justify-content: center;
            Gap: 2rem;
            Margin: 1.8rem 2rem 1.5rem;
            Border-bottom: 2px solid #2a241e;
            Padding-bottom: 0.5rem;
        }

        .tab-btn {
            Background: none;
            Border: none;
            Font-size: 1.6rem;
            Font-weight: 700;
            Font-family: inherit;
            Padding: 0.4rem 1.8rem;
            Cursor: pointer;
            Color: #9e8870;
            Transition: 0.2s;
            Letter-spacing: 1px;
        }

        .tab-btn.active {
            Color: #e07c2c;
            Border-bottom: 3px solid #e07c2c;
            Margin-bottom: -0.7rem;
        }

        /* Съдържание на табовете */
        .tab-pane {
            Display: none;
            Padding: 0 2rem 2rem 2rem;
            Animation: fadeIn 0.25s ease;
        }

        .tab-pane.active-pane {
            Display: block;
        }

        @keyframes fadeIn {
            From { opacity: 0; }
            To { opacity: 1; }
        }

        /* Категории в менюто */
        .menu-category {
            Margin-bottom: 2rem;
        }

        .category-title {
            Font-size: 1.7rem;
            Font-weight: 700;
            Color: #e7b27b;
            Border-left: 5px solid #e07c2c;
            Padding-left: 1rem;
            Margin-bottom: 1.2rem;
            Margin-top: 1.5rem;
        }

        .category-title:first-of-type {
            Margin-top: 0;
        }

        /* Мрежа за елементите */
        .items-grid {
            Display: grid;
            Grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            Gap: 0.8rem 1.5rem;
        }

        .menu-item-card {
            Background: #13110e;
            Border-radius: 1rem;
            Padding: 0.8rem 1.2rem;
            Transition: all 0.2s;
            Border: 1px solid #2a241e;
        }

        .menu-item-card:hover {
            Background: #1c1814;
            Border-color: #e07c2c40;
        }

        .item-main {
            Display: flex;
            Justify-content: space-between;
            Align-items: baseline;
            Flex-wrap: wrap;
            Gap: 0.5rem;
        }

        .item-name {
            Font-weight: 600;
            Font-size: 0.95rem;
            Color: #f0e2d2;
        }

        .item-price {
            Font-weight: 700;
            Color: #f2a65a;
            Background: #241f1a;
            Padding: 0.2rem 0.7rem;
            Border-radius: 30px;
            Font-size: 0.8rem;
            White-space: nowrap;
        }

        .item-note {
            Font-size: 0.7rem;
            Color: #b6986e;
            Margin-top: 0.3rem;
        }

        Footer {
            Background: #0a0907;
            Text-align: center;
            Padding: 1.5rem;
            Border-top: 1px solid #2a241e;
            Font-size: 0.8rem;
            Color: #b68b54;
        }

        .phone {
            Color: #e07c2c;
            Font-weight: bold;
            Font-size: 1rem;
        }

        @media (max-width: 700px) {
            .tab-btn {
                Font-size: 1.2rem;
                Padding: 0.3rem 1rem;
            }
            .logo-text {
                Font-size: 2rem;
            }
            .tab-pane {
                Padding: 0 1rem 1.5rem;
            }
            .items-grid {
                Grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                „Straldzhanska Mus. Barrel 50ml - €3.00“, „Straldzhanska grape rakia 50ml - €2.70“, „Slivenska perla barrel 50ml - €3.00“,
                „Slivenska perla 50ml - €2.70“, „Peshtera rakia 50ml - €1.50“, „Nashe Loze rakia 50ml - €1.50“,
                „Karlovska mus. 50ml - €2.00“, „Serbian quince rakia 50ml - €3.00“, „Serbian pear rakia 50ml - €3.00“,
                „Ouzo 50ml - €2.00“, „Pernot 50ml - €2.70“
            ]}
        ]
    };

    Function renderMenu(data, kitchenContainerId, drinksContainerId) {
        // Рендер кухня
        Const kitchenDiv = document.getElementById(kitchenContainerId);
        kitchenDiv.innerHTML = ‚‘;
        data.kitchen.forEach(cat => {
            const catDiv = document.createElement(‚div‘);
            catDiv.className = ‚menu-category‘;
            catDiv.innerHTML = `<div class=“category-title“>${cat.category}</div><div class=“items-grid“ id=“grid-${cat.category.replace(/[^a-z0-9]/gi, ‚‘)}“></div>`;
            kitchenDiv.appendChild(catDiv);
            const grid = catDiv.querySelector(‚.items-grid‘);
            cat.items.forEach(item => {
                const [namePart, pricePart] = item.split(‚ – ‚);
                const card = document.createElement(‚div‘);
                card.className = ‚menu-item-card‘;
                card.innerHTML = `<div class=“item-main“><span class=“item-name“>${namePart}</span><span class=“item-price“>${pricePart || ‚—‚}</span></div>`;
                grid.appendChild(card);
            });
        });
        // Рендер напитки
        Const drinksDiv = document.getElementById(drinksContainerId);
        drinksDiv.innerHTML = ‚‘;
        data.drinks.forEach(cat => {
            const catDiv = document.createElement(‚div‘);
            catDiv.className = ‚menu-category‘;
            catDiv.innerHTML = `<div class=“category-title“>${cat.category}</div><div class=“items-grid“ id=“grid-${cat.category.replace(/[^a-z0-9]/gi, ‚‘)}“></div>`;
            drinksDiv.appendChild(catDiv);
            const grid = catDiv.querySelector(‚.items-grid‘);
            cat.items.forEach(item => {
                const [namePart, pricePart] = item.split(‚ – ‚);
                const card = document.createElement(‚div‘);
                card.className = ‚menu-item-card‘;
                card.innerHTML = `<div class=“item-main“><span class=“item-name“>${namePart}</span><span class=“item-price“>${pricePart || ‚—‚}</span></div>`;
                grid.appendChild(card);
            });
        });
    }

    // Първоначално рендиране на български
    renderMenu(menuDataBG, ‚kitchen-content‘, ‚drinks-content‘);

    // Езикова логика
    Const langBg = document.querySelector(‚[data-lang=“bg“]‘);
    Const langEn = document.querySelector(‚[data-lang=“en“]‘);
    langBg.addEventListener(‚click‘, () => {
        renderMenu(menuDataBG, ‚kitchen-content‘, ‚drinks-content‘);
        langBg.classList.add(‚active‘);
        langEn.classList.remove(‚active‘);
    });
    langEn.addEventListener(‚click‘, () => {
        renderMenu(menuDataEN, ‚kitchen-content‘, ‚drinks-content‘);
        langEn.classList.add(‚active‘);
        langBg.classList.remove(‚active‘);
    });

    // Таб логика (Кухня / Напитки)
    Const tabBtns = document.querySelectorAll(‚.tab-btn‘);
    Const kitchenPane = document.getElementById(‚kitchen-pane‘);
    Const drinksPane = document.getElementById(‚drinks-pane‘);
    tabBtns.forEach(btn => {
        btn.addEventListener(‚click‘, () => {
            const tab = btn.getAttribute(‚data-tab‘);
            if (tab === ‚kitchen‘) {
                kitchenPane.classList.add(‚active-pane‘);
                drinksPane.classList.remove(‚active-pane‘);
                btn.classList.add(‚active‘);
                document.querySelector(‚.tab-btn[data-tab=“drinks“]‘).classList.remove(‚active‘);
            } else {
                kitchenPane.classList.remove(‚active-pane‘);
                drinksPane.classList.add(‚active-pane‘);
                btn.classList.add(‚active‘);
                document.querySelector(‚.tab-btn[data-tab=“kitchen“]‘).classList.remove(‚active‘);
            }
        });
    });
</script>
</body>
</html>
